name: build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

  workflow_dispatch:

  schedule:
    - cron: '0 0 1 * *'

jobs:
  build:
    name: go-${{ matrix.go-version }}/emacs-${{ matrix.emacs-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - go-version: '1.24'
            emacs-version: '27.1'
          - go-version: 'stable'
            emacs-version: '27.1'
          - go-version: 'stable'
            emacs-version: '30.2'

    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
          cache: true

      - name: Setup Emacs
        uses: purcell/setup-emacs@bdc64dc730ae1fcba200bfd52cb1b4cf6159cbe5 # v8.0
        with:
          version: ${{ matrix.emacs-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman xvfb imagemagick sudo

      - name: Install go-task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          install-mode: binary
          install-only: true
          version: v2.11.0

      - name: Show tool versions
        run: |
          go version
          emacs --version
          podman --version
          xvfb-run --help >/dev/null
          import -version
          task --version
          golangci-lint --version

      - name: Build
        run: task build

      - name: Lint
        run: task lint

      - name: Docs
        run: task docs

      - name: Test
        run: task test

      - name: E2E
        run: task e2e
