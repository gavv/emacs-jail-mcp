version: "2"

linters:
  default: none
  enable:
    - dupword
    - errcheck
    - errorlint
    - govet
    - lll
    - misspell
    - recvcheck
    - staticcheck
  settings:
    lll:
      line-length: 95
      tab-width: 1
  exclusions:
    rules:
      # bytecomp.go contains an embedded Elisp template where `t` (boolean true)
      # appears multiple times as a language keyword; dupword false-positive.
      - path: internal/tools/bytecomp\.go
        linters:
          - dupword
