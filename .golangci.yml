version: "2"

linters:
  default: none
  enable:
    - dupword
    - errcheck
    - errorlint
    - govet
    - lll
    - misspell
    - recvcheck
    - staticcheck
  settings:
    lll:
      line-length: 95
      tab-width: 1
  exclusions:
    rules:
      - path: internal/tools/bytecomp\.go
        linters:
          - dupword
